<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            background:#f2f2f2;
        }
        .board{
            width:300px;
            margin:20px auto;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:5px;
        }
        .cell{
            height:100px;
            background:white;
            border:2px solid black;
            font-size:40px;
            display:flex;
            justify-content:center;
            align-items:center;
            cursor:pointer;
        }
    </style>
</head>
<body>

<h2>Tic Tac Toe</h2>

<div class="board">
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell"></div>
</div>

<h3 id="msg"></h3>
<button onclick="reset()">Restart</button>

<script src="Tic_Tac_Toe.js"></script>
</body>
</html>
